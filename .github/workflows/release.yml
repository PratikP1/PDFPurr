name: Release

# Triggered when a version tag is pushed: v0.1.0, v0.2.0, v1.0.0, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Step 1: Verify everything passes before releasing
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build docs
        run: cargo doc --no-deps

      - name: Verify package
        run: cargo package

  # Step 2: Create GitHub Release with changelog and built crate
  github-release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          # Write to file to preserve multiline
          echo "$NOTES" > /tmp/release-notes.md

      - name: Build release package
        run: |
          cargo package
          cp target/package/pdfpurr-${{ steps.version.outputs.version }}.crate .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PDFPurr v${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          files: |
            pdfpurr-${{ steps.version.outputs.version }}.crate
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
